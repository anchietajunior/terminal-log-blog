<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/98.css">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body>
  <div class="desktop">
    {% include desktop-icons.html %}

    <div class="window main-window" id="main-window">
      <div class="title-bar">
        <div class="title-bar-text">{{ page.window_title | default: site.title }}</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      {% include toolbar.html %}
      <div class="window-body main-window-body">
        {{ content }}
      </div>
      <div class="status-bar">
        <p class="status-bar-field">{{ site.author.bio }}</p>
        <p class="status-bar-field">Jekyll {{ jekyll.version }}</p>
      </div>
    </div>
  </div>

  {% include taskbar.html %}

  <script src="{{ '/assets/js/desktop.js' | relative_url }}"></script>
</body>
</html>
